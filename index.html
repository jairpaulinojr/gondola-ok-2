<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÔNDOLA OK</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f2f2f2;
            padding:15px;
        }

        .container{
            max-width:450px;
            margin:auto;
            background:#fff;
            border-radius:10px;
            padding:15px;
            box-shadow:0 2px 10px rgba(0,0,0,.15);
        }

        .topo{
            background:#0d6efd;
            color:#fff;
            padding:15px;
            border-radius:8px;
            text-align:center;
            margin-bottom:15px;
        }

        .topo h1{
            font-size:22px;
            margin-bottom:5px;
        }

        .topo p{
            font-size:13px;
        }

        .login{
            width:100%;
        }

        .login input,
        .login select{
            width:100%;
            padding:10px;
            margin:6px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        .login button{
            width:100%;
            padding:12px;
            margin-top:8px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:15px;
            font-weight:bold;
        }

        table{
            width:100%;
        }

        td,th{
            word-break:break-word;
        }

        svg{
            max-width:100%;
        }
    </style>
</head>

<body>

<div class="container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script src="script.js"></script>

</body>
</html>
